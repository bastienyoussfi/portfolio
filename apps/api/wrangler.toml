name = "portfolio-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Uncomment after creating KV namespace:
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "your-kv-namespace-id"

# D1 Database for analytics
# Create with: wrangler d1 create portfolio-analytics
# Then replace the database_id below
[[d1_databases]]
binding = "DB"
database_name = "portfolio-analytics"
database_id = "your-d1-database-id"
